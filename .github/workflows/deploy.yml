name: Deploy Maps to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "playwright>=1.40"
          python -m playwright install chromium --with-deps

      - name: Download boundary data
        run: |
          python -m core.boundaries --detail BGC

      - name: Generate maps
        env:
          GA_TRACKING_ID: ${{ vars.GA_TRACKING_ID }}
        run: |
          # Get all season folders from geocoded_teams directory
          SEASONS=$(ls -d data/rugby/geocoded_teams/*/ 2>/dev/null | xargs -n 1 basename | sort -r)

          for season in $SEASONS; do
            python -m rugby.distances --season=$season
          done

          for season in $SEASONS; do
            python -m rugby.maps --no-debug --season=$season --production
          done

          for season in $SEASONS; do
            start_year="${season%%-*}"
            if [ "$start_year" -ge 2022 ]; then
              # Men's pyramid + women's pyramid (pyramid.png / pyramid_womens.png in dist/<season>/).
              python -m rugby.pyramid_image --season="$season" --png --png-scale 2
              python -m rugby.pyramid_image --womens --season="$season" --png --png-scale 2
            fi
          done

          # Match-day maps before webpages — season indexes link to match_day only if it exists
          # when rugby.webpages runs (see rugby.webpages.detect_tier_files ``has_match_day``).
          for season in $SEASONS; do
            if [ -d "data/rugby/fixture_data/$season" ]; then
              python -m rugby.match_day --season=$season --production
            fi
          done

          python -m rugby.team_pages --production
          python -m rugby.webpages --production

          # Custom map builder data + HTML page (teams catalogue + boundaries)
          python -m rugby.custom_map --production

          # Football maps (not linked from index pages)
          python -m football.maps --production

          python -m rugby.seo

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "dist"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
