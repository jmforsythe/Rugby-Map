name: Deploy Maps to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # One runner: geoJSON download + distill dist/shared once (avoids races when parallel rugby.maps skip_if_exists races).
  prepare:
    runs-on: ubuntu-latest
    outputs:
      seasons_json: ${{ steps.seasons.outputs.seasons_json }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies (no Playwright yet)
        run: |
          pip install -r requirements.txt

      - name: Download boundary data (ONS / ITL etc.)
        run: |
          python -m core.boundaries --detail BGC

      - name: Discover seasons (geocoded_teams dirs)
        id: seasons
        run: |
          set -eo pipefail
          list="${RUNNER_TEMP}/ci-seasons.txt"
          ( ls -d data/rugby/geocoded_teams/*/ 2>/dev/null || true ) | xargs -n1 basename | sort -r > "$list"
          echo "Season count: $(wc -l < "$list" | tr -d ' ')"
          cat "$list"
          json="$(jq -Rs 'split("\n") | map(select(length > 0))' < "$list" | jq -c .)"
          echo "seasons_json=$json" >> "$GITHUB_OUTPUT"

      - name: Emit dist/shared (boundaries bundle for Tier + match-day maps)
        run: |
          set -eo pipefail
          FIRST="$(head -n1 "${RUNNER_TEMP}/ci-seasons.txt")"
          if [ -z "$FIRST" ]; then echo "No geocoded season dirs"; exit 1; fi
          python -m rugby.maps --production --season="$FIRST" --no-debug --emit-shared-boundaries-only

      # upload-artifact strips parent dirs when uploading a folder alone; downstream expects data/boundaries/*.geojson.
      - name: Pack boundary GeoJSON for artifact
        run: tar czf rugby-boundaries.tar.gz data/boundaries

      - name: Upload boundary GeoJSON cache (reuse in matrix jobs)
        uses: actions/upload-artifact@v4
        with:
          name: rugby-boundaries-data
          path: rugby-boundaries.tar.gz
          retention-days: 3

      - name: Upload dist/shared bootstrap
        uses: actions/upload-artifact@v4
        with:
          name: rugby-dist-shared
          path: dist/shared
          retention-days: 3

  # Parallel per-season: distances → Folium maps → pyramid PNG → match_day (fixture seasons only).
  rugby-season:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      GA_TRACKING_ID: ${{ vars.GA_TRACKING_ID }}
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        season: ${{ fromJSON(needs.prepare.outputs.seasons_json) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "playwright>=1.40"
          python -m playwright install chromium --with-deps

      - name: Restore boundary GeoJSON cache
        uses: actions/download-artifact@v4
        with:
          name: rugby-boundaries-data
          path: .

      - name: Extract boundaries into workspace
        run: tar xzf rugby-boundaries.tar.gz

      - name: Restore dist/shared
        uses: actions/download-artifact@v4
        with:
          name: rugby-dist-shared
          path: dist

      - name: Rugby — travel distances / maps / pyramid / match_day (single season)
        env:
          SEASON: ${{ matrix.season }}
        run: |
          set -eo pipefail
          python -m rugby.distances --season="$SEASON"
          python -m rugby.maps --no-debug --season="$SEASON" --production

          python -m rugby.pyramid_image --season="$SEASON" --png --png-scale 2
          python -m rugby.pyramid_image --womens --season="$SEASON" --png --png-scale 2
          if find "data/rugby/geocoded_teams/$SEASON/merit" -mindepth 2 -name "*.json" -print -quit 2>/dev/null | grep -q .; then
            python -m rugby.pyramid_image --merit --season="$SEASON" --png --png-scale 2
          fi

          if [ -d "data/rugby/fixture_data/$SEASON" ]; then
            python -m rugby.match_day --season="$SEASON" --production
          fi

      - name: Upload dist/<season> slice
        uses: actions/upload-artifact@v4
        with:
          name: rugby-dist-season-${{ matrix.season }}
          path: dist/${{ matrix.season }}
          retention-days: 3

  assemble:
    runs-on: ubuntu-latest
    needs: [prepare, rugby-season]
    env:
      GA_TRACKING_ID: ${{ vars.GA_TRACKING_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore boundary GeoJSON (football + custom map)
        uses: actions/download-artifact@v4
        with:
          name: rugby-boundaries-data
          path: .

      - name: Extract boundaries into workspace
        run: tar xzf rugby-boundaries.tar.gz

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies (no Playwright — not needed for assemble steps)
        run: |
          pip install -r requirements.txt

      - name: Merge dist/shared + per-season dirs
        run: mkdir -p dist

      - name: Download rugby-dist-shared into dist/
        uses: actions/download-artifact@v4
        with:
          name: rugby-dist-shared
          path: dist

      - name: Merge all season artifacts into dist/
        uses: actions/download-artifact@v4
        with:
          pattern: rugby-dist-season-*
          path: dist
          merge-multiple: true

      - name: Rugby — team profile pages & teams directory
        run: |
          python -m rugby.team_pages --production

      - name: Rugby — season indexes & site landing pages
        run: |
          python -m rugby.webpages --production

      - name: Rugby — custom map builder (teams catalogue & boundaries JSON)
        run: |
          python -m rugby.custom_map --production

      - name: Football — Folium maps
        run: |
          python -m football.maps --production

      - name: Rugby — sitemap & robots.txt
        run: |
          python -m rugby.seo

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact (dist/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "dist"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: assemble
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
