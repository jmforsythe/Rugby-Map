name: Deploy Maps to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # One runner: geoJSON download + distill dist/shared once (avoids races when parallel rugby.maps skip_if_exists races).
  prepare:
    runs-on: ubuntu-latest
    outputs:
      seasons_json: ${{ steps.seasons.outputs.seasons_json }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies (no Playwright yet)
        run: |
          pip install -r requirements.txt

      - name: Cache ONS boundary GeoJSON
        uses: actions/cache@v4
        id: boundaries-cache
        with:
          path: data/boundaries
          key: boundaries-bgc-${{ hashFiles('core/boundaries.py', 'requirements.txt') }}
          restore-keys: |
            boundaries-bgc-

      - name: Download boundary data (ONS / ITL etc.)
        if: steps.boundaries-cache.outputs.cache-hit != 'true'
        run: |
          python -m core.boundaries --detail BGC

      - name: Discover seasons (geocoded_teams dirs)
        id: seasons
        run: |
          set -eo pipefail
          list="${RUNNER_TEMP}/ci-seasons.txt"
          ( ls -d data/rugby/geocoded_teams/*/ 2>/dev/null || true ) | xargs -n1 basename | sort -r > "$list"
          echo "Season count: $(wc -l < "$list" | tr -d ' ')"
          cat "$list"
          json="$(jq -Rs 'split("\n") | map(select(length > 0))' < "$list" | jq -c .)"
          echo "seasons_json=$json" >> "$GITHUB_OUTPUT"

      - name: Emit dist/shared (boundaries bundle for Tier + match-day maps)
        run: |
          set -eo pipefail
          FIRST="$(head -n1 "${RUNNER_TEMP}/ci-seasons.txt")"
          if [ -z "$FIRST" ]; then echo "No geocoded season dirs"; exit 1; fi
          python -m rugby.maps --production --season="$FIRST" --no-debug --emit-shared-boundaries-only

      # upload-artifact strips parent dirs when uploading a folder alone; downstream expects data/boundaries/*.geojson.
      - name: Pack boundary GeoJSON for artifact
        run: tar --zstd -cf rugby-boundaries.tar.zst data/boundaries

      - name: Upload boundary GeoJSON cache (reuse in matrix jobs)
        uses: actions/upload-artifact@v4
        with:
          name: rugby-boundaries-data
          path: rugby-boundaries.tar.zst
          retention-days: 3

      # Directory uploads drop the containing folder name → shared assets would land wrong and break every map.
      # Tar preserves paths: dist/shared/{boundaries,...} and match_day assets that expect /shared/... on the server.
      - name: Pack dist/shared for artifact
        run: tar --zstd -cf rugby-dist-shared.tar.zst -C dist shared

      - name: Upload dist/shared bootstrap tarball
        uses: actions/upload-artifact@v4
        with:
          name: rugby-dist-shared
          path: rugby-dist-shared.tar.zst
          retention-days: 3

  # Parallel per-season: distances → maps ∥ pyramids ∥ match_day (merit comps in parallel).
  rugby-season:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      GA_TRACKING_ID: ${{ vars.GA_TRACKING_ID }}
    strategy:
      fail-fast: false
      max-parallel: 26
      matrix:
        season: ${{ fromJSON(needs.prepare.outputs.seasons_json) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-py3.12-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright for pyramid PNG export
        run: |
          pip install "playwright>=1.40"
          python -m playwright install chromium --with-deps

      - name: Restore boundary GeoJSON cache
        uses: actions/download-artifact@v4
        with:
          name: rugby-boundaries-data
          path: .

      - name: Extract boundaries into workspace
        run: tar --zstd -xf rugby-boundaries.tar.zst

      - name: Download dist/shared tarball
        uses: actions/download-artifact@v4
        with:
          name: rugby-dist-shared
          path: .

      - name: Extract dist/shared into workspace
        run: mkdir -p dist && tar --zstd -xf rugby-dist-shared.tar.zst -C dist

      - name: Rugby — distances, maps, pyramids, match_day (parallel)
        env:
          SEASON: ${{ matrix.season }}
        run: |
          bash scripts/ci_rugby_season.sh "$SEASON"

      - name: Pack season output tarball (preserve YYYY-YYYY/ prefix across merge)
        run: tar --zstd -cf "rugby-season-${{ matrix.season }}.tar.zst" -C dist "${{ matrix.season }}"

      - name: Upload dist/<season> tarball
        uses: actions/upload-artifact@v4
        with:
          name: rugby-dist-season-${{ matrix.season }}
          path: rugby-season-${{ matrix.season }}.tar.zst
          retention-days: 3

  assemble:
    runs-on: ubuntu-latest
    needs: [prepare, rugby-season]
    env:
      GA_TRACKING_ID: ${{ vars.GA_TRACKING_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore boundary GeoJSON (football + custom map)
        uses: actions/download-artifact@v4
        with:
          name: rugby-boundaries-data
          path: .

      - name: Extract boundaries into workspace
        run: tar --zstd -xf rugby-boundaries.tar.zst

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies (no Playwright — not needed for assemble steps)
        run: |
          pip install -r requirements.txt

      - name: Initialise dist layout
        run: mkdir -p dist

      - name: Download dist/shared tarball
        uses: actions/download-artifact@v4
        with:
          name: rugby-dist-shared
          path: .

      - name: Extract dist/shared into dist/
        run: tar --zstd -xf rugby-dist-shared.tar.zst -C dist

      - name: Download all season tarball artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rugby-dist-season-*
          path: _incoming

      - name: Extract all seasons into dist/
        run: |
          set -eo pipefail
          maps=$(find _incoming -type f \( -name 'rugby-season-*.tar.zst' -o -name 'rugby-season-*.tar.gz' \) | wc -l)
          if [ "$maps" -lt 1 ]; then
            echo "No season tarball under _incoming:"
            find _incoming -type f || true
            exit 1
          fi
          while IFS= read -r -d '' tg; do
            echo "Unpack $tg"
            case "$tg" in
              *.tar.zst) tar --zstd -xf "$tg" -C dist ;;
              *.tar.gz) tar xzf "$tg" -C dist ;;
              *) echo "Unknown archive: $tg"; exit 1 ;;
            esac
          done < <(find _incoming -type f \( -name 'rugby-season-*.tar.zst' -o -name 'rugby-season-*.tar.gz' \) -print0)

      - name: Generate rugby, custom map, and football outputs (parallel)
        run: |
          set -eo pipefail
          pids=()
          python -m rugby.team_pages --production & pids+=($!)
          python -m rugby.custom_map --production & pids+=($!)
          python -m football.maps --production & pids+=($!)
          fail=0
          for pid in "${pids[@]}"; do
            wait "$pid" || fail=1
          done
          exit "$fail"

      - name: Rugby — season indexes & site landing pages
        run: |
          python -m rugby.webpages --production

      - name: Rugby — sitemap & robots.txt
        run: |
          python -m rugby.seo

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact (dist/)
        uses: actions/upload-pages-artifact@v4
        with:
          path: "dist"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: assemble
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
