name: Deploy Maps to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # One runner: geoJSON download + distill dist/shared once (avoids races when parallel rugby.maps skip_if_exists races).
  prepare:
    runs-on: ubuntu-latest
    outputs:
      seasons_json: ${{ steps.seasons.outputs.seasons_json }}
      football_seasons_json: ${{ steps.football-seasons.outputs.football_seasons_json }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies (no Playwright yet)
        run: |
          pip install -r requirements.txt

      - name: Cache ONS boundary GeoJSON
        uses: actions/cache@v4
        id: boundaries-cache
        with:
          path: data/boundaries
          key: boundaries-bgc-${{ hashFiles('core/boundaries.py', 'requirements.txt') }}
          restore-keys: |
            boundaries-bgc-

      - name: Download boundary data (ONS / ITL etc.)
        if: steps.boundaries-cache.outputs.cache-hit != 'true'
        run: |
          python -m core.boundaries --detail BGC

      - name: Discover seasons (geocoded_teams dirs)
        id: seasons
        run: |
          set -eo pipefail
          list="${RUNNER_TEMP}/ci-seasons.txt"
          ( ls -d data/rugby/geocoded_teams/*/ 2>/dev/null || true ) | xargs -n1 basename | sort -r > "$list"
          echo "Season count: $(wc -l < "$list" | tr -d ' ')"
          cat "$list"
          json="$(jq -Rs 'split("\n") | map(select(length > 0))' < "$list" | jq -c .)"
          echo "seasons_json=$json" >> "$GITHUB_OUTPUT"

      - name: Discover football pyramid seasons
        id: football-seasons
        run: |
          set -eo pipefail
          list="${RUNNER_TEMP}/football-ci-seasons.txt"
          : > "$list"
          for pyramid_dir in data/football/geocoded_teams/*/pyramid; do
            [ -d "$pyramid_dir" ] || continue
            basename "$(dirname "$pyramid_dir")" >> "$list"
          done
          sort -ru -o "$list" "$list"
          echo "Football pyramid season count: $(wc -l < "$list" | tr -d ' ')"
          cat "$list"
          if [ ! -s "$list" ]; then
            echo 'football_seasons_json=[]' >> "$GITHUB_OUTPUT"
          else
            json="$(jq -Rs 'split("\n") | map(select(length > 0))' < "$list" | jq -c .)"
            echo "football_seasons_json=$json" >> "$GITHUB_OUTPUT"
          fi

      - name: Emit dist/shared (boundaries bundle for Tier + match-day maps)
        run: |
          set -eo pipefail
          FIRST="$(head -n1 "${RUNNER_TEMP}/ci-seasons.txt")"
          if [ -z "$FIRST" ]; then echo "No geocoded season dirs"; exit 1; fi
          python -m rugby.maps --production --season="$FIRST" --no-debug --emit-shared-boundaries-only

      # upload-artifact strips parent dirs when uploading a folder alone; downstream expects data/boundaries/*.geojson.
      - name: Pack boundary GeoJSON for artifact
        run: tar --zstd -cf rugby-boundaries.tar.zst data/boundaries

      - name: Upload boundary GeoJSON cache (reuse in matrix jobs)
        uses: actions/upload-artifact@v4
        with:
          name: rugby-boundaries-data
          path: rugby-boundaries.tar.zst
          retention-days: 3

      # Directory uploads drop the containing folder name → shared assets would land wrong and break every map.
      # Tar preserves paths: dist/shared/{boundaries,...} and match_day assets that expect /shared/... on the server.
      - name: Pack dist/shared for artifact
        run: tar --zstd -cf rugby-dist-shared.tar.zst -C dist shared

      - name: Upload dist/shared bootstrap tarball
        uses: actions/upload-artifact@v4
        with:
          name: rugby-dist-shared
          path: rugby-dist-shared.tar.zst
          retention-days: 3

  # Parallel per-season: distances → maps ∥ match_day; pyramid PNGs sequential (one Chromium).
  rugby-season:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      GA_TRACKING_ID: ${{ vars.GA_TRACKING_ID }}
    strategy:
      fail-fast: false
      max-parallel: 26
      matrix:
        season: ${{ fromJSON(needs.prepare.outputs.seasons_json) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-py3.12-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright for pyramid PNG export
        run: |
          pip install "playwright>=1.40"
          python -m playwright install chromium --with-deps

      - name: Restore boundary GeoJSON cache
        uses: actions/download-artifact@v4
        with:
          name: rugby-boundaries-data
          path: .

      - name: Extract boundaries into workspace
        run: tar --zstd -xf rugby-boundaries.tar.zst

      - name: Download dist/shared tarball
        uses: actions/download-artifact@v4
        with:
          name: rugby-dist-shared
          path: .

      - name: Extract dist/shared into workspace
        run: mkdir -p dist && tar --zstd -xf rugby-dist-shared.tar.zst -C dist

      - name: Pyramid raster cache digest
        id: pyramid-cache-digest
        env:
          SEASON: ${{ matrix.season }}
        run: echo "digest=$(python -m rugby.pyramid_ci_cache digest "$SEASON")" >> "$GITHUB_OUTPUT"

      - name: Restore pyramid raster cache
        uses: actions/cache@v4
        id: pyramid-raster-cache
        with:
          path: _pyramid_raster_cache/${{ matrix.season }}
          key: pyramid-raster-${{ matrix.season }}-${{ steps.pyramid-cache-digest.outputs.digest }}
          restore-keys: |
            pyramid-raster-${{ matrix.season }}-

      - name: Restore cached pyramid artifacts into dist
        env:
          SEASON: ${{ matrix.season }}
        run: |
          set -eo pipefail
          mkdir -p "dist/${SEASON}"
          if python -m rugby.pyramid_ci_cache check "$SEASON"; then
            python -m rugby.pyramid_ci_cache restore "$SEASON"
            echo "PYRAMID_RASTER_CACHE_RESTORED=1" >> "$GITHUB_ENV"
          fi

      - name: Rugby — distances, maps, pyramids, match_day (parallel)
        env:
          SEASON: ${{ matrix.season }}
        run: |
          bash scripts/ci_rugby_season.sh "$SEASON"

      - name: Save pyramid raster cache
        if: env.PYRAMID_RASTER_CACHE_RESTORED != '1'
        env:
          SEASON: ${{ matrix.season }}
        run: python -m rugby.pyramid_ci_cache save "$SEASON"

      # Tarball layout: dist/<season>/… plus data/rugby/distance_cache/<season>.json
      # (official league travel stats for custom-map teams.js — routed km/min when
      # the global OSRM cache is present, Haversine otherwise). Extract at repo root
      # in assemble, not under dist/.
      - name: Pack season output tarball
        env:
          SEASON: ${{ matrix.season }}
        run: |
          set -eo pipefail
          cache="data/rugby/distance_cache/${SEASON}.json"
          if [ ! -f "$cache" ]; then
            echo "Missing distance cache (rugby.distances should have written $cache)"
            exit 1
          fi
          tar --zstd -cf "rugby-season-${SEASON}.tar.zst" \
            "dist/${SEASON}" \
            "$cache"

      - name: Upload dist/<season> tarball
        uses: actions/upload-artifact@v4
        with:
          name: rugby-dist-season-${{ matrix.season }}
          path: rugby-season-${{ matrix.season }}.tar.zst
          retention-days: 3

  football-season:
    needs: prepare
    if: ${{ needs.prepare.outputs.football_seasons_json != '[]' }}
    runs-on: ubuntu-latest
    env:
      GA_TRACKING_ID: ${{ vars.GA_TRACKING_ID }}
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        season: ${{ fromJSON(needs.prepare.outputs.football_seasons_json) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-py3.12-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright for pyramid PNG export
        run: |
          pip install "playwright>=1.40"
          python -m playwright install chromium --with-deps

      - name: Restore boundary GeoJSON cache
        uses: actions/download-artifact@v4
        with:
          name: rugby-boundaries-data
          path: .

      - name: Extract boundaries into workspace
        run: tar --zstd -xf rugby-boundaries.tar.zst

      - name: Download dist/shared tarball
        uses: actions/download-artifact@v4
        with:
          name: rugby-dist-shared
          path: .

      - name: Extract dist/shared into workspace
        run: mkdir -p dist && tar --zstd -xf rugby-dist-shared.tar.zst -C dist

      - name: Football pyramid raster cache digest
        id: football-pyramid-cache-digest
        env:
          SEASON: ${{ matrix.season }}
        run: echo "digest=$(python -m football.pyramid_ci_cache digest "$SEASON")" >> "$GITHUB_OUTPUT"

      - name: Restore football pyramid raster cache
        uses: actions/cache@v4
        id: football-pyramid-raster-cache
        with:
          path: _football_pyramid_raster_cache/${{ matrix.season }}
          key: football-pyramid-raster-${{ matrix.season }}-${{ steps.football-pyramid-cache-digest.outputs.digest }}
          restore-keys: |
            football-pyramid-raster-${{ matrix.season }}-

      - name: Restore cached football pyramid artifacts into dist
        env:
          SEASON: ${{ matrix.season }}
        run: |
          set -eo pipefail
          mkdir -p "dist/football/${SEASON}"
          if python -m football.pyramid_ci_cache check "$SEASON"; then
            python -m football.pyramid_ci_cache restore "$SEASON"
            echo "FOOTBALL_PYRAMID_RASTER_CACHE_RESTORED=1" >> "$GITHUB_ENV"
          fi

      - name: Football — pyramid maps and diagram raster
        env:
          SEASON: ${{ matrix.season }}
        run: |
          bash scripts/ci_football_season.sh "$SEASON"

      - name: Save football pyramid raster cache
        if: env.FOOTBALL_PYRAMID_RASTER_CACHE_RESTORED != '1'
        env:
          SEASON: ${{ matrix.season }}
        run: python -m football.pyramid_ci_cache save "$SEASON"

      - name: Pack football season output tarball
        env:
          SEASON: ${{ matrix.season }}
        run: |
          set -eo pipefail
          tar --zstd -cf "football-season-${SEASON}.tar.zst" "dist/football/${SEASON}"

      - name: Upload dist/football/<season> tarball
        uses: actions/upload-artifact@v4
        with:
          name: football-dist-season-${{ matrix.season }}
          path: football-season-${{ matrix.season }}.tar.zst
          retention-days: 3

  assemble:
    runs-on: ubuntu-latest
    needs: [prepare, rugby-season, football-season]
    if: >-
      always() &&
      needs.prepare.result == 'success' &&
      needs.rugby-season.result == 'success' &&
      (needs.football-season.result == 'success' || needs.football-season.result == 'skipped')
    env:
      GA_TRACKING_ID: ${{ vars.GA_TRACKING_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore boundary GeoJSON (football + custom map)
        uses: actions/download-artifact@v4
        with:
          name: rugby-boundaries-data
          path: .

      - name: Extract boundaries into workspace
        run: tar --zstd -xf rugby-boundaries.tar.zst

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies (no Playwright — not needed for assemble steps)
        run: |
          pip install -r requirements.txt

      - name: Initialise dist layout
        run: mkdir -p dist

      - name: Download dist/shared tarball
        uses: actions/download-artifact@v4
        with:
          name: rugby-dist-shared
          path: .

      - name: Extract dist/shared into dist/
        run: tar --zstd -xf rugby-dist-shared.tar.zst -C dist

      - name: Download all season tarball artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rugby-dist-season-*
          path: _incoming

      - name: Download football season tarball artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: football-dist-season-*
          path: _incoming
          merge-multiple: true

      - name: Extract all seasons (maps + distance caches)
        run: |
          set -eo pipefail
          maps=$(find _incoming -type f \( -name 'rugby-season-*.tar.zst' -o -name 'rugby-season-*.tar.gz' \) | wc -l)
          if [ "$maps" -lt 1 ]; then
            echo "No season tarball under _incoming:"
            find _incoming -type f || true
            exit 1
          fi
          while IFS= read -r -d '' tg; do
            echo "Unpack $tg"
            case "$tg" in
              *.tar.zst) tar --zstd -xf "$tg" ;;
              *.tar.gz) tar xzf "$tg" ;;
              *) echo "Unknown archive: $tg"; exit 1 ;;
            esac
          done < <(find _incoming -type f \( -name 'rugby-season-*.tar.zst' -o -name 'rugby-season-*.tar.gz' \) -print0)

      - name: Extract football season tarballs
        run: |
          set -eo pipefail
          fb=$(find _incoming -type f \( -name 'football-season-*.tar.zst' -o -name 'football-season-*.tar.gz' \) | wc -l)
          echo "Football season tarballs: ${fb}"
          while IFS= read -r -d '' tg; do
            echo "Unpack $tg"
            case "$tg" in
              *.tar.zst) tar --zstd -xf "$tg" ;;
              *.tar.gz) tar xzf "$tg" ;;
              *) echo "Unknown archive: $tg"; exit 1 ;;
            esac
          done < <(find _incoming -type f \( -name 'football-season-*.tar.zst' -o -name 'football-season-*.tar.gz' \) -print0)

      - name: Verify per-season distance caches for custom map
        run: |
          set -eo pipefail
          count=$(find data/rugby/distance_cache -maxdepth 1 -name '*.json' | wc -l | tr -d ' ')
          echo "Per-season distance caches restored: ${count}"
          if [ "${count}" -lt 1 ]; then
            echo "Expected data/rugby/distance_cache/<season>.json from matrix jobs"
            exit 1
          fi

      - name: Generate rugby and custom map outputs (parallel)
        run: |
          set -eo pipefail
          pids=()
          python -m rugby.team_pages --production & pids+=($!)
          python -m rugby.custom_map --production & pids+=($!)
          fail=0
          for pid in "${pids[@]}"; do
            wait "$pid" || fail=1
          done
          exit "$fail"

      - name: Football — season indexes & site landing pages
        run: |
          python -m football.webpages --production

      - name: Rugby — season indexes & site landing pages
        run: |
          python -m rugby.webpages --production

      - name: Rugby — sitemap & robots.txt
        run: |
          python -m rugby.seo

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact (dist/)
        uses: actions/upload-pages-artifact@v4
        with:
          path: "dist"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: assemble
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
