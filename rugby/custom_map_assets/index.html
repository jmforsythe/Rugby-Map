<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Custom Rugby Map Builder</title>
    <meta
      name="description"
      content="Build custom rugby union maps — select teams, assign them to leagues, and see live territory maps with travel distance statistics."
    />
    {{FAVICON_HTML}}
    {{GA_SCRIPT}}
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
    />
    <style>
      :root {
        --bg: #f9f9f9;
        --bg-card: #fff;
        --bg-card-alt: #f5f7fa;
        --text: #333;
        --text-muted: #666;
        --text-heading: #2c3e50;
        --border: #e0e0e0;
        --border-light: #f0f0f0;
        --accent: #0066cc;
        --accent-hover: #0052a3;
        --accent-light: #e8f4fd;
        --shadow: rgba(0, 0, 0, 0.08);
        --sidebar-w: 370px;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1a1a2e;
          --bg-card: #16213e;
          --bg-card-alt: #1e2a45;
          --text: #e0e0e0;
          --text-muted: #a0a0a0;
          --text-heading: #e0e8f0;
          --border: #2a2a4a;
          --border-light: #252545;
          --accent: #4da6ff;
          --accent-hover: #80bfff;
          --accent-light: #1a2a4a;
          --shadow: rgba(0, 0, 0, 0.3);
        }
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: var(--text);
        background: var(--bg);
        display: flex;
        flex-direction: column;
      }

      /* Header */
      .app-header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 16px;
        background: var(--bg-card);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        z-index: 1000;
      }
      .app-header a {
        color: var(--text-muted);
        text-decoration: none;
        font-size: 14px;
      }
      .app-header a:hover {
        color: var(--accent);
      }
      .app-header h1 {
        font-size: 16px;
        font-weight: 600;
        color: var(--text-heading);
      }
      .header-actions {
        margin-left: auto;
        display: flex;
        gap: 8px;
      }

      /* Layout */
      .app-body {
        display: flex;
        flex: 1;
        min-height: 0;
      }

      /* Sidebar */
      .sidebar {
        width: var(--sidebar-w);
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        background: var(--bg-card);
        border-right: 1px solid var(--border);
        overflow: hidden;
      }
      .sidebar-section {
        padding: 12px;
        border-bottom: 1px solid var(--border-light);
      }
      .sidebar-section h2 {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
      }

      /* Search */
      .search-box {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 14px;
        background: var(--bg);
        color: var(--text);
        outline: none;
      }
      .search-box:focus {
        border-color: var(--accent);
      }
      .search-box::placeholder {
        color: var(--text-muted);
      }
      .search-results {
        max-height: 220px;
        overflow-y: auto;
        margin-top: 6px;
      }
      .search-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
      }
      .search-item:hover {
        background: var(--accent-light);
      }
      .search-item img {
        width: 22px;
        height: 22px;
        object-fit: contain;
        border-radius: 2px;
        flex-shrink: 0;
      }
      .search-hint {
        color: var(--text-muted);
        font-size: 12px;
        padding: 6px 0;
      }

      /* Leagues panel */
      .leagues-panel {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
      }
      .add-league-btn {
        width: 100%;
        padding: 8px;
        border: 2px dashed var(--border);
        border-radius: 6px;
        background: transparent;
        color: var(--text-muted);
        font-size: 13px;
        cursor: pointer;
        margin-bottom: 10px;
      }
      .add-league-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .league-card {
        background: var(--bg-card-alt);
        border: 1px solid var(--border-light);
        border-radius: 8px;
        margin-bottom: 8px;
        overflow: hidden;
      }
      .league-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        cursor: pointer;
        user-select: none;
      }
      .league-color {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        flex-shrink: 0;
        cursor: pointer;
        border: 2px solid rgba(0, 0, 0, 0.15);
      }
      .league-name-input {
        flex: 1;
        background: transparent;
        border: none;
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
        outline: none;
        min-width: 0;
      }
      .league-count {
        font-size: 12px;
        color: var(--text-muted);
        flex-shrink: 0;
      }
      .league-delete {
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 16px;
        padding: 0 2px;
        line-height: 1;
      }
      .league-delete:hover {
        color: #e74c3c;
      }
      .league-teams {
        padding: 4px 10px 8px;
      }
      .league-team {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 0;
        font-size: 13px;
        border-bottom: 1px solid var(--border-light);
      }
      .league-team:last-child {
        border-bottom: none;
      }
      .league-team img {
        width: 18px;
        height: 18px;
        object-fit: contain;
        flex-shrink: 0;
      }
      .league-team-remove {
        margin-left: auto;
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 14px;
        line-height: 1;
        padding: 0 4px;
      }
      .league-team-remove:hover {
        color: #e74c3c;
      }

      /* Stats */
      .stats-section {
        padding: 12px;
        border-top: 1px solid var(--border);
        flex-shrink: 0;
        max-height: 200px;
        overflow-y: auto;
      }
      .stats-section h2 {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 6px;
      }
      .stat-row {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        padding: 3px 0;
        border-bottom: 1px solid var(--border-light);
      }
      .stat-row:last-child {
        border-bottom: none;
      }
      .stat-label {
        color: var(--text-muted);
      }
      .stat-value {
        font-weight: 600;
      }

      /* Map */
      .map-container {
        flex: 1;
        position: relative;
      }
      #map {
        width: 100%;
        height: 100%;
      }

      /* Popup styling — matches standard maps (core/map_builder.py POPUP_CSS) */
      .leaflet-popup-content {
        margin: 6px 10px !important;
        line-height: 1.3;
      }
      .leaflet-popup-content-wrapper,
      .leaflet-popup-tip {
        background: var(--bg-card);
        color: var(--text);
        box-shadow: 0 3px 14px rgba(0, 0, 0, 0.35);
      }
      .leaflet-popup-close-button {
        color: var(--text-muted) !important;
      }
      .rugby-popup {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        width: 220px;
        font-size: 13px;
      }
      .rugby-popup h4 {
        margin: 0 0 4px 0;
        font-size: 15px;
        line-height: 1.2;
      }
      .rugby-popup hr {
        margin: 6px 0;
        border: 0;
        border-top: 1px solid var(--border);
      }
      .rugby-popup p {
        margin: 0 0 3px 0;
      }
      .rugby-popup p:last-child {
        margin-bottom: 0;
      }
      .rugby-popup .popup-label {
        font-weight: bold;
      }
      .rugby-popup a {
        color: var(--accent);
      }
      .rugby-popup a:hover {
        text-decoration: underline;
      }
      .move-dropdown {
        margin-top: 4px;
      }
      .move-dropdown-btn {
        width: 100%;
        padding: 5px 8px;
        border: 1px solid var(--border);
        border-radius: 4px;
        font-size: 12px;
        background: var(--bg);
        color: var(--text);
        cursor: pointer;
        text-align: left;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .move-dropdown-btn:hover {
        border-color: var(--accent);
      }
      .move-dropdown-btn .dd-arrow {
        font-size: 10px;
        color: var(--text-muted);
        transition: transform 0.15s;
      }
      .move-dropdown.open .move-dropdown-btn .dd-arrow {
        transform: rotate(90deg);
      }
      .move-dropdown-list {
        display: none;
        margin-top: 4px;
        border: 1px solid var(--border);
        border-radius: 4px;
        max-height: 150px;
        overflow-y: auto;
      }
      .move-dropdown.open .move-dropdown-list {
        display: block;
      }
      .move-dropdown-item {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 8px;
        font-size: 12px;
        cursor: pointer;
        color: var(--text);
      }
      .move-dropdown-item:hover {
        background: var(--accent-light);
      }
      .move-dropdown-item .dd-swatch {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
        border: 1px solid rgba(0,0,0,0.15);
      }
      .move-dropdown-item .dd-name {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .move-dropdown-item .dd-count {
        color: var(--text-muted);
        font-size: 11px;
        flex-shrink: 0;
      }
      .move-dropdown-item.dd-new {
        border-top: 1px solid var(--border-light);
        color: var(--accent);
      }

      /* Buttons */
      .btn {
        padding: 6px 12px;
        border-radius: 4px;
        font-size: 12px;
        cursor: pointer;
        border: 1px solid var(--border);
        background: var(--bg-card);
        color: var(--text);
      }
      .btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .btn-primary {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      .btn-primary:hover {
        background: var(--accent-hover);
        border-color: var(--accent-hover);
        color: #fff;
      }
      .copied-toast {
        position: fixed;
        top: 50px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--accent);
        color: #fff;
        padding: 8px 20px;
        border-radius: 6px;
        font-size: 13px;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
        z-index: 9999;
      }
      .copied-toast.show {
        opacity: 1;
      }

      /* Toggle for sidebar on mobile */
      .sidebar-toggle {
        display: none;
        position: fixed;
        bottom: 16px;
        right: 16px;
        z-index: 2000;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: var(--accent);
        color: #fff;
        border: none;
        font-size: 22px;
        cursor: pointer;
        box-shadow: 0 2px 8px var(--shadow);
      }

      /* Territory panel */
      .territory-panel {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 1000;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 12px;
        color: var(--text);
        min-width: 180px;
        box-shadow: 0 2px 8px var(--shadow);
      }
      .territory-panel-header {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        cursor: pointer;
        user-select: none;
      }
      .territory-panel-header input {
        cursor: pointer;
      }
      .territory-panel-header label {
        cursor: pointer;
        flex: 1;
      }
      .territory-panel-toggle {
        font-size: 10px;
        color: var(--text-muted);
        transition: transform 0.15s;
      }
      .territory-panel.expanded .territory-panel-toggle {
        transform: rotate(90deg);
      }
      .territory-panel-body {
        display: none;
        padding: 6px 10px 10px;
        border-top: 1px solid var(--border-light);
      }
      .territory-panel.expanded .territory-panel-body {
        display: block;
      }
      .tp-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-top: 6px;
      }
      .tp-row label {
        font-size: 11px;
        color: var(--text-muted);
        white-space: nowrap;
      }
      .tp-row select {
        padding: 2px 4px;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: var(--bg);
        color: var(--text);
        font-size: 11px;
        cursor: pointer;
      }
      .tp-row input[type="range"] {
        width: 80px;
        cursor: pointer;
      }
      .tp-row .tp-val {
        font-size: 10px;
        color: var(--text-muted);
        min-width: 24px;
        text-align: right;
      }

      /* Import modal */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 3000;
        align-items: center;
        justify-content: center;
      }
      .modal-overlay.open {
        display: flex;
      }
      .modal {
        background: var(--bg-card);
        border-radius: 10px;
        box-shadow: 0 8px 32px var(--shadow);
        width: 420px;
        max-width: 90vw;
        max-height: 80vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
      }
      .modal-header h2 {
        font-size: 15px;
        font-weight: 600;
        color: var(--text-heading);
      }
      .modal-close {
        background: none;
        border: none;
        font-size: 20px;
        color: var(--text-muted);
        cursor: pointer;
        line-height: 1;
        padding: 0 4px;
      }
      .modal-close:hover {
        color: var(--text);
      }
      .modal-search {
        padding: 10px 16px;
        border-bottom: 1px solid var(--border-light);
      }
      .modal-search input {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 14px;
        background: var(--bg);
        color: var(--text);
        outline: none;
      }
      .modal-search input:focus {
        border-color: var(--accent);
      }
      .modal-list {
        flex: 1;
        overflow-y: auto;
        padding: 6px 0;
      }
      .modal-tier {
        border-bottom: 1px solid var(--border-light);
      }
      .modal-tier-header {
        display: flex;
        align-items: center;
        padding: 8px 16px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        transition: background 0.1s;
        gap: 6px;
        user-select: none;
      }
      .modal-tier-header:hover {
        background: var(--accent-light);
      }
      .modal-tier-chevron {
        font-size: 10px;
        color: var(--text-muted);
        transition: transform 0.15s;
        flex-shrink: 0;
        width: 14px;
        text-align: center;
      }
      .modal-tier.expanded .modal-tier-chevron {
        transform: rotate(90deg);
      }
      .modal-tier-name {
        flex: 1;
      }
      .modal-tier-count {
        font-size: 12px;
        color: var(--text-muted);
        flex-shrink: 0;
      }
      .modal-tier-import {
        padding: 3px 8px;
        border-radius: 4px;
        font-size: 11px;
        cursor: pointer;
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #fff;
        flex-shrink: 0;
        margin-left: 6px;
      }
      .modal-tier-import:hover {
        background: var(--accent-hover);
      }
      .modal-leagues {
        display: none;
        padding-left: 20px;
      }
      .modal-tier.expanded .modal-leagues {
        display: block;
      }
      .modal-league-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 16px;
        cursor: pointer;
        font-size: 12px;
        color: var(--text);
        transition: background 0.1s;
      }
      .modal-league-item:hover {
        background: var(--accent-light);
      }
      .modal-league-name {
        flex: 1;
      }
      .modal-league-count {
        font-size: 11px;
        color: var(--text-muted);
        margin-left: 8px;
        flex-shrink: 0;
      }
      .modal-empty {
        padding: 24px 16px;
        text-align: center;
        color: var(--text-muted);
        font-size: 13px;
      }
      .modal-section-header {
        padding: 10px 16px 4px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: var(--text-muted);
        border-top: 1px solid var(--border);
        margin-top: 4px;
      }
      .modal-section-header:first-child {
        border-top: none;
        margin-top: 0;
      }

      @media (max-width: 768px) {
        .sidebar {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 60vh;
          bottom: auto;
          border-right: none;
          border-bottom: 2px solid var(--border);
          z-index: 1500;
          transform: translateY(-100%);
          transition: transform 0.3s ease;
        }
        .sidebar.open {
          transform: translateY(41px);
        }
        .sidebar-toggle {
          display: block;
        }
        .map-container {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <header class="app-header">
      <a href="{{HOME_HREF}}">&larr; Home</a>
      <h1>Custom Map Builder</h1>
      <div class="header-actions">
        <button class="btn" id="btnImportTier">Import Tier</button>
        <button class="btn" id="btnClearAll">Clear All</button>
        <button class="btn btn-primary" id="btnCopyLink">Copy Link</button>
      </div>
    </header>

    <div class="app-body">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-section">
          <h2>Find Teams</h2>
          <input
            type="text"
            class="search-box"
            id="searchInput"
            placeholder="Search 3,600+ teams&hellip;"
          />
          <div class="search-results" id="searchResults">
            <div class="search-hint">Type to search by team name</div>
          </div>
        </div>
        <div class="leagues-panel" id="leaguesPanel">
          <button class="add-league-btn" id="btnAddLeague">+ Add League</button>
        </div>
        <div class="stats-section" id="statsSection">
          <h2>Distance Stats</h2>
          <div id="statsBody">
            <div class="search-hint">Add teams to see distance statistics</div>
          </div>
        </div>
      </aside>
      <div class="map-container">
        <div id="map"></div>
        <div class="territory-panel" id="territoryPanel">
          <div class="territory-panel-header" id="territoryPanelHeader">
            <input type="checkbox" id="territoryCheck" checked />
            <label for="territoryCheck">Territories</label>
            <span class="territory-panel-toggle">&#9654;</span>
          </div>
          <div class="territory-panel-body">
            <div class="tp-row">
              <label for="entryLevel" title="Minimum region size that will always be fully coloured — the broadest brush">Broad brush</label>
              <select id="entryLevel" title="Minimum region size that will always be fully coloured — the broadest brush">
                <option value="itl0" selected>Country</option>
                <option value="itl1">Region</option>
                <option value="itl2">Sub-region</option>
                <option value="itl3">County</option>
                <option value="lad">District</option>
                <option value="ward">Ward</option>
              </select>
            </div>
            <div class="tp-row">
              <label for="floorLevel" title="Smallest region size used to split contested areas — the finest brush">Fine brush</label>
              <select id="floorLevel" title="Smallest region size used to split contested areas — the finest brush">
                <option value="itl0">Country</option>
                <option value="itl1" selected>Region</option>
                <option value="itl2">Sub-region</option>
                <option value="itl3">County</option>
                <option value="lad">District</option>
                <option value="ward">Ward</option>
              </select>
            </div>
            <div class="tp-row">
              <label for="fillOpacity">Fill</label>
              <input
                type="range"
                id="fillOpacity"
                min="0"
                max="1"
                step="0.01"
                value="0.6"
              />
              <span class="tp-val" id="fillOpacityVal">0.6</span>
            </div>
            <div class="tp-row">
              <label for="borderWeight">Border</label>
              <input
                type="range"
                id="borderWeight"
                min="0"
                max="4"
                step="0.5"
                value="1"
              />
              <span class="tp-val" id="borderWeightVal">1</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>

      // ── Haversine ──────────────────────────────────────────────
      function haversineKm(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = ((lat2 - lat1) * Math.PI) / 180;
        const dLon = ((lon2 - lon1) * Math.PI) / 180;
        const a =
          Math.sin(dLat / 2) ** 2 +
          Math.cos((lat1 * Math.PI) / 180) *
            Math.cos((lat2 * Math.PI) / 180) *
            Math.sin(dLon / 2) ** 2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      }

      function calcLeagueStats(league) {
        const teams = league.teams;
        if (teams.length < 2)
          return {
            teams: teams.map((t) => ({ name: t.n, avg: 0, total: 0 })),
            avg: 0,
          };
        const teamStats = teams.map((t) => {
          let total = 0;
          for (const o of teams) {
            if (o.n !== t.n) total += haversineKm(t.lat, t.lng, o.lat, o.lng);
          }
          const avg = total / (teams.length - 1);
          return { name: t.n, avg, total };
        });
        const leagueAvg =
          teamStats.reduce((s, t) => s + t.avg, 0) / teamStats.length;
        return { teams: teamStats, avg: leagueAvg };
      }

      // ── Map init ───────────────────────────────────────────────
      let tileLayer;

      function initMap() {
        map = L.map("map", { zoomControl: true }).setView([52.5, -1.5], 7);

          "(prefers-color-scheme: dark)",
        ).matches;
        tileLayer = L.tileLayer(
          isDark
            ? "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png"
            : "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
          {
            attribution:
              '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            maxZoom: 19,
          },
        ).addTo(map);
        boundaryOutlineLayer = L.layerGroup().addTo(map);
        territoryLayer = L.layerGroup().addTo(map);
        markersGroup = L.layerGroup().addTo(map);
      }

      // ── Boundary outlines (always visible, like regular maps) ──
      function addBoundaryOutlines() {
        if (!boundariesReady || typeof BOUNDARIES === "undefined") return;
        boundaryOutlineLayer.clearLayers();
        const bd = BOUNDARIES;
        const isDark = window.matchMedia(
          "(prefers-color-scheme: dark)",
        ).matches;

        const countryStyle = {
          fillColor: isDark ? "darkgray" : "lightgray",
          color: isDark ? "#ccc" : "black",
          weight: 2,
          fillOpacity: 0.1,
        };
        for (const name of Object.keys(bd.countries || {})) {
          L.geoJSON(bd.countries[name].geom, { style: countryStyle }).addTo(
            boundaryOutlineLayer,
          );
        }

        const itlStyle = {
          fillColor: "transparent",
          color: isDark ? "lightgray" : "gray",
          weight: 0.5,
          fillOpacity: 0,
          opacity: 0.4,
        };
        for (const level of ["itl1", "itl2", "itl3"]) {
          for (const name of Object.keys(bd[level] || {})) {
            L.geoJSON(bd[level][name].geom, { style: itlStyle }).addTo(
              boundaryOutlineLayer,
            );
          }
        }
      }

      window
        .matchMedia("(prefers-color-scheme: dark)")
        .addEventListener("change", function (e) {
          if (tileLayer) {
            var url = tileLayer._url;
            if (e.matches && url.indexOf("light_all") !== -1) {
              tileLayer.setUrl(url.replace("light_all", "dark_all"));
            } else if (!e.matches && url.indexOf("dark_all") !== -1) {
              tileLayer.setUrl(url.replace("dark_all", "light_all"));
            }
          }
          addBoundaryOutlines();
        });

      // ── Rendering ──────────────────────────────────────────────

                  count +

                  ? "<p>League Avg: " + team.lavg.toFixed(1) + " km</p>"

            let customHtml = "";

                '<p><span class="popup-label">Custom Distances:</span></p>' +

                " km</p>" +
                "<p>Team Total: " +
                ts.total.toFixed(1) +
                " km</p>" +

                stats.avg.toFixed(1) +

            let moveItems = "";

              : L.divIcon({

                    "<div style='text-align:center'>" +
                    "<div style='width:30px;height:30px;border-radius:50%;background:" +
                    league.color +
                    ";border:2px solid white;box-shadow:0 0 3px rgba(0,0,0,0.3)'></div>" +
                    "</div>",

            const marker = L.marker([team.lat, team.lng], {

      function renderMap() {
        renderMarkers();
        renderTerritories(cachedAllPlaced);
        renderStats();
      }

      function restyleTerritories() {
        const update = {
          fillOpacity: territoryFillOpacity,
          weight: territoryBorderWeight,
          opacity: territoryFillOpacity,
        };
        territoryLayer.eachLayer(function (layer) {
          if (layer.setStyle) {
            layer.setStyle(update);
          } else if (layer.eachLayer) {
            layer.eachLayer(function (sub) {
              if (sub.setStyle) sub.setStyle(update);
            });
          }
        });
      }

      // ── ITL Region Territory Algorithm ─────────────────────────
      // Port of _collect_group_geometries from core/map_builder.py

      const LEVELS = ["itl0", "itl1", "itl2", "itl3", "lad", "ward"];
      const LEVEL_IDX = { itl0: 0, itl1: 1, itl2: 2, itl3: 3, lad: 4, ward: 5 };
      const NEXT_LEVEL = { itl0: "itl1", itl1: "itl2", itl2: "itl3", itl3: "lad", lad: "ward" };
      const TEAM_REGION_KEY = { itl0: "r0", itl1: "r1", itl2: "r2", itl3: "r3", lad: "rl", ward: "rw" };
      const CHILD_MAP_KEY = { itl0: "itl0_to_itl1s", itl1: "itl1_to_itl2s", itl2: "itl2_to_itl3s", itl3: "itl3_to_lads", lad: "lad_to_wards" };

      let ENTRY_LEVEL = document.getElementById("entryLevel").value;
      let FLOOR_LEVEL = document.getElementById("floorLevel").value;
      let FLOOR_IDX = LEVEL_IDX[FLOOR_LEVEL];
      let territoryFillOpacity = 0.6;
      let territoryBorderWeight = 1;

      function createBoundedVoronoi(items, boundaryGeom) {
        if (items.length < 2) return [];
        var points = turf.featureCollection(
          items.map(function (it) {
            return turf.point([it.team.lng, it.team.lat]);
          }),
        );
        var bbox = turf.bbox(
          boundaryGeom.type === "Feature"
            ? boundaryGeom
            : turf.feature(boundaryGeom),
        );
        var pad = Math.max(bbox[2] - bbox[0], bbox[3] - bbox[1]);
        var paddedBox = [
          bbox[0] - pad,
          bbox[1] - pad,
          bbox[2] + pad,
          bbox[3] + pad,
        ];
        var voronoiPolys;
        try {
          voronoiPolys = turf.voronoi(points, { bbox: paddedBox });
        } catch (_) {
          return [];
        }
        if (
          !voronoiPolys ||
          !voronoiPolys.features ||
          voronoiPolys.features.length !== items.length
        )
          return [];

        var boundaryFeat =
          boundaryGeom.type === "Feature"
            ? boundaryGeom
            : turf.feature(boundaryGeom);
        var cellsByColor = {};
        for (var i = 0; i < items.length; i++) {
          var cell = voronoiPolys.features[i];
          if (!cell || !cell.geometry) continue;
          var clipped;
          try {
            clipped = turf.intersect(
              turf.featureCollection([cell, boundaryFeat]),
            );
          } catch (_) {
            continue;
          }
          if (!clipped || !clipped.geometry) continue;
          var color = items[i].league.color;
          if (!cellsByColor[color]) cellsByColor[color] = [];
          cellsByColor[color].push(clipped);
        }

        var result = [];
        for (var color in cellsByColor) {
          var cells = cellsByColor[color];
          if (cells.length === 1) {
            result.push({ geom: cells[0].geometry, color: color });
          } else {
            try {
              var merged = turf.union(turf.featureCollection(cells));
              if (merged)
                result.push({ geom: merged.geometry, color: color });
              else
                for (var j = 0; j < cells.length; j++)
                  result.push({ geom: cells[j].geometry, color: color });
            } catch (_) {
              for (var j = 0; j < cells.length; j++)
                result.push({ geom: cells[j].geometry, color: color });
            }
          }
        }
        return result;
      }

      function closestGroup(items, centroid) {
        if (!items.length) return null;
        let best = null,
          bestDist = Infinity;
        for (const it of items) {
          const dx = centroid[0] - it.team.lng;
          const dy = centroid[1] - it.team.lat;
          const d = dx * dx + dy * dy;
          if (d < bestDist) {
            bestDist = d;
            best = it;
          }
        }
        return best ? best.league.color + "|" + best.league.name : null;
      }

      function buildRegionIndex(allPlaced) {
        const idx = { itl0: {}, itl1: {}, itl2: {}, itl3: {}, lad: {}, ward: {} };
        for (const p of allPlaced) {
          for (const level of LEVELS) {
            const key = p.team[TEAM_REGION_KEY[level]];
            if (key) {
              if (!idx[level][key]) idx[level][key] = [];
              idx[level][key].push(p);
            }
          }
        }
        return idx;
      }

      function splitRegion(level, regionKey, parentItems, regionIdx) {
        if (!boundariesReady || typeof BOUNDARIES === "undefined") return [];
        const bd = BOUNDARIES;
        const regionData = (bd[level] || {})[regionKey];
        if (!regionData) return [];

        const itemsHere = regionIdx[level][regionKey] || [];

        if (!itemsHere.length) {
          const fb = closestGroup(parentItems, regionData.centroid);
          if (!fb) return [];
          const [color] = fb.split("|");
          return [{ geom: regionData.geom, color }];
        }

        const groupSet = new Set(itemsHere.map((it) => it.league.name));

        if (groupSet.size === 1) {
          const color = itemsHere[0].league.color;
          const childLevel = NEXT_LEVEL[level];
          if (childLevel && LEVEL_IDX[childLevel] <= FLOOR_IDX) {
            const childMapName = CHILD_MAP_KEY[level];
            const childKeys = (bd[childMapName] || {})[regionKey] || [];
            const occupied = childKeys.filter(
              (ck) => (regionIdx[childLevel][ck] || []).length > 0,
            );
            if (occupied.length <= 1 && occupied.length > 0) {
              const narrow = [];
              for (const ck of occupied) {
                narrow.push(
                  ...splitRegion(childLevel, ck, itemsHere, regionIdx),
                );
              }
              if (narrow.length) return narrow;
            }
          }
          return [{ geom: regionData.geom, color }];
        }

        const childLevel = NEXT_LEVEL[level];
        if (!childLevel) {
          const vcells = createBoundedVoronoi(itemsHere, regionData.geom);
          if (vcells.length) return vcells;
          const fb = closestGroup(itemsHere, regionData.centroid);
          if (!fb) return [];
          const [color] = fb.split("|");
          return [{ geom: regionData.geom, color }];
        }

        const childMapName = CHILD_MAP_KEY[level];
        const childKeys = (bd[childMapName] || {})[regionKey] || [];
        if (!childKeys.length) {
          const vcells = createBoundedVoronoi(itemsHere, regionData.geom);
          if (vcells.length) return vcells;
          const fb = closestGroup(itemsHere, regionData.centroid);
          if (!fb) return [];
          const [color] = fb.split("|");
          return [{ geom: regionData.geom, color }];
        }

        const result = [];
        const emptyChildren = [];
        for (const ck of childKeys) {
          const childItems = regionIdx[childLevel][ck] || [];
          if (!childItems.length) {
            emptyChildren.push(ck);
            continue;
          }
          const childGroups = new Set(childItems.map((it) => it.league.name));
          if (childGroups.size === 1) {
            const childRegion = (bd[childLevel] || {})[ck];
            if (childRegion)
              result.push({
                geom: childRegion.geom,
                color: childItems[0].league.color,
              });
          } else {
            result.push(...splitRegion(childLevel, ck, childItems, regionIdx));
          }
        }

        for (const eck of emptyChildren) {
          const childRegion = (bd[childLevel] || {})[eck];
          if (!childRegion) continue;
          const fb = closestGroup(itemsHere, childRegion.centroid);
          if (fb) {
            const [color] = fb.split("|");
            result.push({ geom: childRegion.geom, color });
          }
        }

        return result;
      }

      function removeSmallHoles(geojsonGeom) {
        // Mirrors Python's remove_small_holes (min_hole_area = 1e-4 in degrees²)
        var MIN_HOLE_DEG2 = 1e-4;
        if (!geojsonGeom) return geojsonGeom;

        function filterHoles(polyCoords) {
          if (polyCoords.length <= 1) return polyCoords;
          var filtered = [polyCoords[0]];
          for (var i = 1; i < polyCoords.length; i++) {
            var ring = polyCoords[i];
            // Shoelace formula for area in degrees² (same unit as Python's Shapely check)
            var area = 0;
            for (var j = 0; j < ring.length - 1; j++) {
              area += (ring[j + 1][0] - ring[j][0]) * (ring[j + 1][1] + ring[j][1]);
            }
            if (Math.abs(area / 2) >= MIN_HOLE_DEG2) {
              filtered.push(ring);
            }
          }
          return filtered;
        }

        if (geojsonGeom.type === "Polygon") {
          return { type: "Polygon", coordinates: filterHoles(geojsonGeom.coordinates) };
        }
        if (geojsonGeom.type === "MultiPolygon") {
          return {
            type: "MultiPolygon",
            coordinates: geojsonGeom.coordinates.map(filterHoles),
          };
        }
        return geojsonGeom;
      }

      function simplifyForUnion(feat) {
        // Mirrors Python: g.simplify(0.001, preserve_topology=True) before unary_union
        try {
          return turf.simplify(feat, { tolerance: 0.001, highQuality: true });
        } catch (_) {
          return feat;
        }
      }

      function mergeCellsByColor(cells) {
        const byColor = {};
        for (const cell of cells) {
          if (!byColor[cell.color]) byColor[cell.color] = [];
          byColor[cell.color].push(cell.geom);
        }
        const merged = [];
        for (const [color, geoms] of Object.entries(byColor)) {
          if (geoms.length === 1) {
            merged.push({ geom: removeSmallHoles(geoms[0]), color });
            continue;
          }
          try {
            var features = geoms.map(function (g) {
              var f = g.type === "Feature" ? g : turf.feature(g);
              return simplifyForUnion(f);
            });
            const fc = turf.featureCollection(features);
            const union = turf.union(fc);
            if (union) {
              merged.push({ geom: removeSmallHoles(union.geometry), color });
            } else {
              for (const g of geoms) merged.push({ geom: g, color });
            }
          } catch (_) {
            for (const g of geoms) merged.push({ geom: g, color });
          }
        }
        return merged;
      }

      function addTerritoryCell(geom, color) {
        L.geoJSON(geom, {
          style: {
            fillColor: color,
            fillOpacity: territoryFillOpacity,
            color: color,
            weight: territoryBorderWeight,
            opacity: territoryFillOpacity,
          },
        }).addTo(territoryLayer);
      }

      function renderTerritories(allPlaced) {
        territoryLayer.clearLayers();
        if (!territoriesVisible || allPlaced.length < 1) return;

        if (!boundariesReady || typeof BOUNDARIES === "undefined") return;

        const regionIdx = buildRegionIndex(allPlaced);
        const allCells = [];

        const entryRegions = regionIdx[ENTRY_LEVEL];
        for (const regionKey of Object.keys(entryRegions)) {
          const cells = splitRegion(
            ENTRY_LEVEL,
            regionKey,
            entryRegions[regionKey],
            regionIdx,
          );
          allCells.push(...cells);
        }

        for (const cell of mergeCellsByColor(allCells)) {
          addTerritoryCell(cell.geom, cell.color);
        }
      }

      function renderStats() {
        const body = document.getElementById("statsBody");
        if (
          leagues.length === 0 ||
          leagues.every((l) => l.teams.length === 0)
        ) {
          body.innerHTML =
            '<div class="search-hint">Add teams to see distance statistics</div>';
          return;
        }

        let html = "";

        for (const league of leagues) {
          if (league.teams.length < 2) {
            html +=
              '<div class="stat-row"><span class="stat-label" style="color:' +
              league.color +
              '">' +
              escHtml(league.name) +
              '</span><span class="stat-value" style="color:var(--text-muted)">need 2+ teams</span></div>';
            continue;
          }
          const s = league._stats;
          html +=
            '<div class="stat-row"><span class="stat-label" style="color:' +
            league.color +
            '">' +
            escHtml(league.name) +
            '</span><span class="stat-value">' +
            s.avg.toFixed(1) +
            " km avg</span></div>";
        }

        const allTeamsInLeagues = leagues.flatMap((l) => l.teams);
        const withOfficial = allTeamsInLeagues.filter((t) => t.lg);
        if (withOfficial.length > 0) {
          const officialLeagues = {};
          for (const t of withOfficial) {
            if (!officialLeagues[t.lg])
              officialLeagues[t.lg] = {
                name: t.lg,
                lavg: t.lavg || 0,
                teams: [],
              };
            officialLeagues[t.lg].teams.push(t);
          }
          html +=
            '<div style="margin-top:8px;padding-top:6px;border-top:1px solid var(--border)">' +
            '<div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">Official Leagues</div>';
          for (const lg of Object.values(officialLeagues).sort(function (a, b) {
            return a.name.localeCompare(b.name);
          })) {
            html +=
              '<div class="stat-row"><span class="stat-label">' +
              escHtml(lg.name) +
              " (" +
              lg.teams.length +
              ')</span><span class="stat-value">' +
              lg.lavg.toFixed(1) +
              " km avg</span></div>";
          }
          html += "</div>";
        }

        body.innerHTML = html;
      }

      // ── Search ─────────────────────────────────────────────────
      function getAssignedNames() {
        const s = new Set();
        for (const l of leagues) for (const t of l.teams) s.add(t.n);
        return s;
      }

      let searchDebounce;
      function onSearch() {
        clearTimeout(searchDebounce);
        searchDebounce = setTimeout(doSearch, 150);
      }

      function doSearch() {
        const q = document
          .getElementById("searchInput")
          .value.trim()
          .toLowerCase();
        const container = document.getElementById("searchResults");

        if (q.length < 2) {
          container.innerHTML =
            '<div class="search-hint">Type to search by team name</div>';
          return;
        }

        const assigned = getAssignedNames();
        const matches = allTeams
          .filter((t) => t.n.toLowerCase().includes(q) && !assigned.has(t.n))
          .slice(0, 50);

        if (matches.length === 0) {
          container.innerHTML =
            '<div class="search-hint">No matching teams found</div>';
          return;
        }

        container.innerHTML = matches
          .map(
            (t) =>
              '<div class="search-item" data-name="' +
              escAttr(t.n) +
              '">' +
              '<img src="' +
              escAttr(t.img || FALLBACK_ICON) +
              '" onerror="this.src=\'' +
              FALLBACK_ICON +
              "'\">" +
              "<span>" +
              escHtml(t.n) +
              "</span></div>",
          )
          .join("");
      }

      document
        .getElementById("searchResults")
        .addEventListener("click", function (e) {
          const item = e.target.closest(".search-item");
          if (!item) return;
          const name = item.dataset.name;
          addTeamToActiveLeague(name);
        });

      function addTeamToActiveLeague(name) {
        const team = allTeams.find((t) => t.n === name);
        if (!team) return;

        let target =
          leagues.find((l) => l.active) || leagues[leagues.length - 1];
        if (!target) {
          target = createLeague();
        }

        if (target.teams.some((t) => t.n === name)) return;
        target.teams.push(team);

        renderLeagues();
        renderMap();
        doSearch();
        saveToHash();
      }

      // ── League management ──────────────────────────────────────
      function createLeague(name, color) {
        const id = nextLeagueId++;
        const idx = (id - 1) % COLOR_PALETTE.length;
        const league = {
          id,
          name: name || "League " + id,
          color: color || COLOR_PALETTE[idx],
          teams: [],
          active: true,
        };
        for (const l of leagues) l.active = false;
        leagues.push(league);
        renderLeagues();
        return league;
      }

      function deleteLeague(id) {
        leagues = leagues.filter((l) => l.id !== id);
        renderLeagues();
        renderMap();
        saveToHash();
      }

      function removeTeam(leagueId, teamName) {
        const league = leagues.find((l) => l.id === leagueId);
        if (league) league.teams = league.teams.filter((t) => t.n !== teamName);
        renderLeagues();
        renderMap();
        doSearch();
        saveToHash();
      }

      function moveTeam(teamName, fromLeagueId, toLeagueId) {
        var from = leagues.find(function (l) { return l.id === fromLeagueId; });
        var to = leagues.find(function (l) { return l.id === toLeagueId; });
        if (!from || !to) return;
        var teamIdx = from.teams.findIndex(function (t) { return t.n === teamName; });
        if (teamIdx === -1) return;
        var team = from.teams.splice(teamIdx, 1)[0];
        to.teams.push(team);
        renderLeagues();
        renderMap();
        doSearch();
        saveToHash();
      }

      function setActiveLeague(id) {
        for (const l of leagues) l.active = l.id === id;
        renderLeagues();
      }

      function cycleColor(id) {
        const league = leagues.find((l) => l.id === id);
        if (!league) return;
        const idx = COLOR_PALETTE.indexOf(league.color);
        league.color = COLOR_PALETTE[(idx + 1) % COLOR_PALETTE.length];
        renderLeagues();
        renderMap();
        saveToHash();
      }

      function renameLeague(id, newName) {
        const league = leagues.find((l) => l.id === id);
        if (league) league.name = newName;
        saveToHash();
      }

      function renderLeagues() {
        const panel = document.getElementById("leaguesPanel");
        let html =
          '<button class="add-league-btn" id="btnAddLeague">+ Add League</button>';

        for (const league of leagues) {
          const active = league.active
            ? "border-left:3px solid " + league.color
            : "";
          html +=
            '<div class="league-card" style="' +
            active +
            '" data-id="' +
            league.id +
            '">' +
            '<div class="league-header" data-id="' +
            league.id +
            '">' +
            '<div class="league-color" style="background:' +
            league.color +
            '" data-action="color" data-id="' +
            league.id +
            '"></div>' +
            '<input class="league-name-input" value="' +
            escAttr(league.name) +
            '" data-action="rename" data-id="' +
            league.id +
            '">' +
            '<span class="league-count">' +
            league.teams.length +
            "</span>" +
            '<button class="league-delete" data-action="delete" data-id="' +
            league.id +
            '">&times;</button>' +
            "</div>" +
            '<div class="league-teams">';

          for (const team of league.teams) {
            html +=
              '<div class="league-team">' +
              '<img src="' +
              escAttr(team.img || FALLBACK_ICON) +
              '" onerror="this.src=\'' +
              FALLBACK_ICON +
              "'\">" +
              "<span>" +
              escHtml(team.n) +
              "</span>" +
              '<button class="league-team-remove" data-action="remove-team" data-league="' +
              league.id +
              '" data-team="' +
              escAttr(team.n) +
              '">&times;</button>' +
              "</div>";
          }

          html += "</div></div>";
        }

        panel.innerHTML = html;

        panel
          .querySelector("#btnAddLeague")
          .addEventListener("click", function () {
            createLeague();
            saveToHash();
          });
      }

      document
        .getElementById("leaguesPanel")
        .addEventListener("click", function (e) {
          const el = e.target.closest("[data-action]");
          if (!el) {
            const header = e.target.closest(".league-header");
            if (header) setActiveLeague(parseInt(header.dataset.id));
            return;
          }
          const action = el.dataset.action;
          const id = parseInt(el.dataset.id || el.dataset.league);
          if (action === "delete") deleteLeague(id);
          else if (action === "color") cycleColor(id);
          else if (action === "remove-team") removeTeam(id, el.dataset.team);
        });

      document
        .getElementById("leaguesPanel")
        .addEventListener("input", function (e) {
          if (e.target.dataset.action === "rename") {
            renameLeague(parseInt(e.target.dataset.id), e.target.value);
          }
        });

      // ── Import tier ─────────────────────────────────────────────
      // Three sections mirror the main map index page:
      //   1. Pyramid tiers (pyramid teams only)
      //   2. All Leagues per tier (pyramid + merit at same absolute level)
      //   3. Merit competitions (per-competition, per-local-tier)
      var importData = { pyramid: [], allLeagues: [], merit: [] };

      function buildTierIndex() {
        // Pyramid-only: group non-merit teams by absolute tier
        var pyrMap = new Map();
        // All-leagues: group ALL teams by absolute tier
        var allMap = new Map();
        // Merit: group merit teams by competition, then local tier
        var meritMap = new Map();

        for (var i = 0; i < allTeams.length; i++) {
          var t = allTeams[i];
          if (!t.lg) continue;
          var tierNum = t.t || 999;
          var tierName = t.tn || "Unknown";
          var isMerit = !!t.mc;

          // All-leagues (every team with an absolute tier)
          if (!allMap.has(tierNum))
            allMap.set(tierNum, {
              num: tierNum,
              name: tierName,
              leagueMap: new Map(),
            });
          var allTier = allMap.get(tierNum);
          if (!allTier.leagueMap.has(t.lg)) allTier.leagueMap.set(t.lg, []);
          allTier.leagueMap.get(t.lg).push(t);

          if (isMerit) {
            // Merit per-competition
            var comp = t.mc;
            var localTier = t.ml || comp;
            if (!meritMap.has(comp)) meritMap.set(comp, new Map());
            var compMap = meritMap.get(comp);
            if (!compMap.has(localTier))
              compMap.set(localTier, { name: localTier, leagueMap: new Map() });
            var mTier = compMap.get(localTier);
            if (!mTier.leagueMap.has(t.lg)) mTier.leagueMap.set(t.lg, []);
            mTier.leagueMap.get(t.lg).push(t);
          } else {
            // Pyramid-only
            if (!pyrMap.has(tierNum))
              pyrMap.set(tierNum, {
                num: tierNum,
                name: tierName,
                leagueMap: new Map(),
              });
            var pyrTier = pyrMap.get(tierNum);
            if (!pyrTier.leagueMap.has(t.lg)) pyrTier.leagueMap.set(t.lg, []);
            pyrTier.leagueMap.get(t.lg).push(t);
          }
        }

        function finalizeTiers(map) {
          return Array.from(map.values())
            .sort(function (a, b) {
              return a.num - b.num;
            })
            .map(function (tier) {
              var lgs = Array.from(tier.leagueMap.entries())
                .map(function (e) {
                  return { name: e[0], teams: e[1] };
                })
                .sort(function (a, b) {
                  return a.name.localeCompare(b.name);
                });
              return {
                id: "t" + tier.num,
                num: tier.num,
                name: tier.name,
                leagues: lgs,
              };
            });
        }

        importData.pyramid = finalizeTiers(pyrMap);

        // All-leagues: only include tiers that have merit teams (otherwise same as pyramid)
        var meritAbsTiers = new Set();
        for (var j = 0; j < allTeams.length; j++) {
          if (allTeams[j].mc && allTeams[j].t) meritAbsTiers.add(allTeams[j].t);
        }
        importData.allLeagues = finalizeTiers(allMap)
          .filter(function (tier) {
            return meritAbsTiers.has(tier.num);
          })
          .map(function (tier) {
            return {
              id: "al" + tier.num,
              num: tier.num,
              name: tier.name + " + Merit",
              leagues: tier.leagues,
            };
          });

        // Merit: per-competition, per-local-tier
        importData.merit = [];
        var compNames = Array.from(meritMap.keys()).sort();
        for (var ci = 0; ci < compNames.length; ci++) {
          var cName = compNames[ci];
          var tierEntries = meritMap.get(cName);
          var tiers = Array.from(tierEntries.values())
            .sort(function (a, b) {
              return a.name.localeCompare(b.name);
            })
            .map(function (tier) {
              var lgs = Array.from(tier.leagueMap.entries())
                .map(function (e) {
                  return { name: e[0], teams: e[1] };
                })
                .sort(function (a, b) {
                  return a.name.localeCompare(b.name);
                });
              return {
                id: "m_" + cName + "_" + tier.name,
                num: 0,
                name: tier.name,
                leagues: lgs,
              };
            });
          importData.merit.push({ comp: cName, tiers: tiers });
        }
      }

      function openImportModal() {
        document.getElementById("importSearch").value = "";
        renderImportList("");
        document.getElementById("importModal").classList.add("open");
        document.getElementById("importSearch").focus();
      }

      function closeImportModal() {
        document.getElementById("importModal").classList.remove("open");
      }

      function renderTierRow(tier, assigned, q) {
        var matchingLeagues = tier.leagues.filter(function (lg) {
          if (q && !tier.name.toLowerCase().includes(q)) {
            return lg.name.toLowerCase().includes(q);
          }
          return true;
        });
        if (q && matchingLeagues.length === 0) return "";

        var tierTeamCount = 0,
          tierAvail = 0,
          leaguesHtml = "";
        for (var li = 0; li < matchingLeagues.length; li++) {
          var lg = matchingLeagues[li];
          var avail = lg.teams.filter(function (t) {
            return !assigned.has(t.n);
          }).length;
          tierTeamCount += lg.teams.length;
          tierAvail += avail;
          leaguesHtml +=
            '<div class="modal-league-item" data-import-id="' +
            escAttr(tier.id) +
            '" data-league="' +
            escAttr(lg.name) +
            '">' +
            '<span class="modal-league-name">' +
            escHtml(lg.name) +
            "</span>" +
            '<span class="modal-league-count">' +
            avail +
            " / " +
            lg.teams.length +
            " teams</span>" +
            "</div>";
        }

        return (
          '<div class="modal-tier" data-import-id="' +
          escAttr(tier.id) +
          '">' +
          '<div class="modal-tier-header">' +
          '<span class="modal-tier-chevron">&#9654;</span>' +
          '<span class="modal-tier-name">' +
          escHtml(tier.name) +
          "</span>" +
          '<span class="modal-tier-count">' +
          tierAvail +
          " / " +
          tierTeamCount +
          "</span>" +
          '<button class="modal-tier-import" data-action="import-tier" data-import-id="' +
          escAttr(tier.id) +
          '">Import</button>' +
          "</div>" +
          '<div class="modal-leagues">' +
          leaguesHtml +
          "</div>" +
          "</div>"
        );
      }

      function renderImportList(filter) {
        var assigned = getAssignedNames();
        var q = filter.toLowerCase();
        var html = "";
        var anyMatch = false;

        // Section 1: Pyramid tiers
        var pyrHtml = "";
        for (var pi = 0; pi < importData.pyramid.length; pi++) {
          var row = renderTierRow(importData.pyramid[pi], assigned, q);
          if (row) pyrHtml += row;
        }
        if (pyrHtml) {
          html += '<div class="modal-section-header">Pyramid</div>' + pyrHtml;
          anyMatch = true;
        }

        // Section 2: All Leagues (pyramid + merit combined)
        var alHtml = "";
        for (var ai = 0; ai < importData.allLeagues.length; ai++) {
          var row2 = renderTierRow(importData.allLeagues[ai], assigned, q);
          if (row2) alHtml += row2;
        }
        if (alHtml) {
          html +=
            '<div class="modal-section-header">Pyramid + Merit</div>' + alHtml;
          anyMatch = true;
        }

        // Section 3: Merit per-competition
        var meritHtml = "";
        for (var mi = 0; mi < importData.merit.length; mi++) {
          var comp = importData.merit[mi];
          var compRows = "";
          for (var mti = 0; mti < comp.tiers.length; mti++) {
            var row3 = renderTierRow(comp.tiers[mti], assigned, q);
            if (row3) compRows += row3;
          }
          if (compRows) {
            meritHtml +=
              '<div class="modal-section-header">' +
              escHtml(comp.comp) +
              "</div>" +
              compRows;
          }
        }
        if (meritHtml) {
          html += meritHtml;
          anyMatch = true;
        }

        if (!anyMatch) {
          html = '<div class="modal-empty">No matching tiers or leagues</div>';
        }
        document.getElementById("importList").innerHTML = html;
      }

      function findTierById(id) {
        var all = importData.pyramid.concat(importData.allLeagues);
        for (var mi = 0; mi < importData.merit.length; mi++) {
          all = all.concat(importData.merit[mi].tiers);
        }
        return all.find(function (t) {
          return t.id === id;
        });
      }

      function importWholeTier(tierId) {
        var tier = findTierById(tierId);
        if (!tier) return;
        var assigned = getAssignedNames();

        for (var i = 0; i < tier.leagues.length; i++) {
          var lg = tier.leagues[i];
          var teamsToAdd = lg.teams.filter(function (t) {
            return !assigned.has(t.n);
          });
          if (teamsToAdd.length === 0) continue;
          var league = createLeague(lg.name);
          league.teams = teamsToAdd.slice();
          for (var j = 0; j < teamsToAdd.length; j++)
            assigned.add(teamsToAdd[j].n);
        }

        renderImportList(document.getElementById("importSearch").value);
        renderLeagues();
        renderMap();
        doSearch();
        saveToHash();
      }

      function importSingleLeague(tierId, leagueName) {
        var tier = findTierById(tierId);
        if (!tier) return;
        var source = tier.leagues.find(function (lg) {
          return lg.name === leagueName;
        });
        if (!source) return;

        var assigned = getAssignedNames();
        var teamsToAdd = source.teams.filter(function (t) {
          return !assigned.has(t.n);
        });
        if (teamsToAdd.length === 0) return;

        var league = createLeague(leagueName);
        league.teams = teamsToAdd.slice();

        renderImportList(document.getElementById("importSearch").value);
        renderLeagues();
        renderMap();
        doSearch();
        saveToHash();
      }

      document
        .getElementById("importModal")
        .addEventListener("click", function (e) {
          if (e.target === this) {
            closeImportModal();
            return;
          }

          var importBtn = e.target.closest("[data-action='import-tier']");
          if (importBtn) {
            e.stopPropagation();
            importWholeTier(importBtn.dataset.importId);
            return;
          }

          var leagueItem = e.target.closest(".modal-league-item");
          if (leagueItem) {
            importSingleLeague(
              leagueItem.dataset.importId,
              leagueItem.dataset.league,
            );
            return;
          }

          var tierHeader = e.target.closest(".modal-tier-header");
          if (tierHeader) {
            var tierEl = tierHeader.closest(".modal-tier");
            if (tierEl) tierEl.classList.toggle("expanded");
          }
        });
      document
        .getElementById("importModalClose")
        .addEventListener("click", closeImportModal);
      document
        .getElementById("importSearch")
        .addEventListener("input", function () {
          renderImportList(this.value);
        });

      // ── URL hash state ─────────────────────────────────────────
      function saveToHash() {
        if (leagues.length === 0) {
          history.replaceState(null, "", location.pathname);
          return;
        }
        const parts = leagues.map((l) => {
          const teamNames = l.teams
            .map((t) => encodeURIComponent(t.n))
            .join(",");
          return (
            encodeURIComponent(l.name) +
            ":" +
            encodeURIComponent(l.color) +
            ":" +
            teamNames
          );
        });
        history.replaceState(null, "", "#" + parts.join(";"));
      }

      function loadFromHash() {
        const hash = location.hash.slice(1);
        if (!hash) return;

        const teamIndex = new Map();
        for (const t of allTeams) teamIndex.set(t.n, t);

        const parts = hash.split(";").filter(Boolean);
        for (const part of parts) {
          const [rawName, rawColor, ...teamChunks] = part.split(":");
          const name = decodeURIComponent(rawName || "League");
          const color = decodeURIComponent(rawColor || COLOR_PALETTE[0]);
          const teamNames = teamChunks
            .join(":")
            .split(",")
            .map((s) => decodeURIComponent(s))
            .filter(Boolean);
          const teams = teamNames.map((n) => teamIndex.get(n)).filter(Boolean);
          const league = createLeague(name, color);
          league.teams = teams;
        }
        renderLeagues();
        renderMap();
      }

      // ── Utility ────────────────────────────────────────────────
      function escHtml(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }
      function escAttr(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      // ── Init ───────────────────────────────────────────────────
      document
        .getElementById("searchInput")
        .addEventListener("input", onSearch);
      document
        .getElementById("btnAddLeague")
        .addEventListener("click", function () {
          createLeague();
          saveToHash();
        });
      document
        .getElementById("btnImportTier")
        .addEventListener("click", openImportModal);
      document
        .getElementById("btnClearAll")
        .addEventListener("click", function () {
          leagues = [];
          nextLeagueId = 1;
          renderLeagues();
          renderMap();
          saveToHash();
        });
      document
        .getElementById("btnCopyLink")
        .addEventListener("click", function () {
          saveToHash();
          navigator.clipboard.writeText(location.href).then(function () {
            const toast = document.getElementById("copiedToast");
            toast.classList.add("show");
            setTimeout(function () {
              toast.classList.remove("show");
            }, 1500);
          });
        });
      document
        .getElementById("territoryCheck")
        .addEventListener("change", function (e) {
          e.stopPropagation();
          territoriesVisible = this.checked;
          renderTerritories(cachedAllPlaced);
        });
      document
        .getElementById("territoryPanelHeader")
        .addEventListener("click", function (e) {
          if (e.target.id === "territoryCheck" || e.target.tagName === "LABEL")
            return;
          document
            .getElementById("territoryPanel")
            .classList.toggle("expanded");
        });
      document
        .getElementById("entryLevel")
        .addEventListener("change", function () {
          ENTRY_LEVEL = this.value;
          renderTerritories(cachedAllPlaced);
        });
      document
        .getElementById("floorLevel")
        .addEventListener("change", function () {
          FLOOR_LEVEL = this.value;
          FLOOR_IDX = LEVEL_IDX[FLOOR_LEVEL];
          renderTerritories(cachedAllPlaced);
        });
      document
        .getElementById("fillOpacity")
        .addEventListener("input", function () {
          territoryFillOpacity = parseFloat(this.value);
          document.getElementById("fillOpacityVal").textContent = this.value;
          restyleTerritories();
        });
      document
        .getElementById("borderWeight")
        .addEventListener("input", function () {
          territoryBorderWeight = parseFloat(this.value);
          document.getElementById("borderWeightVal").textContent = this.value;
          restyleTerritories();
        });
      document
        .getElementById("sidebarToggle")
        .addEventListener("click", function () {
          document.getElementById("sidebar").classList.toggle("open");
        });

      initMap();

      map.on("popupopen", function (e) {
        var container = e.popup.getElement();
        if (!container) return;
        var dd = container.querySelector(".move-dropdown");
        if (!dd) return;
        var btn = dd.querySelector(".move-dropdown-btn");
        if (btn) {
          btn.addEventListener("click", function (ev) {
            ev.stopPropagation();
            dd.classList.toggle("open");
          });
        }
        dd.addEventListener("click", function (ev) {
          var item = ev.target.closest(".move-dropdown-item");
          if (!item) return;
          var toVal = item.dataset.to;
          var teamName = dd.dataset.team;
          var fromId = parseInt(dd.dataset.from);
          if (toVal === "__new__") {
            var newLeague = createLeague();
            moveTeam(teamName, fromId, newLeague.id);
          } else {
            moveTeam(teamName, fromId, parseInt(toVal));
          }
          map.closePopup();
        });
      });

      function prepareBoundaryItl0() {
        if (typeof BOUNDARIES === "undefined") return;
        var bd = BOUNDARIES;

        if (bd.countries && !bd.itl0) {
          bd.itl0 = {};
          for (var name in bd.countries) {
            var geom = bd.countries[name].geom;
            var centroid;
            try {
              var feat = geom.type === "Feature" ? geom : turf.feature(geom);
              centroid = turf.centroid(feat).geometry.coordinates;
            } catch (_) {
              centroid = [0, 0];
            }
            bd.itl0[name] = { geom: geom, centroid: centroid };
          }
        }

        if (bd.itl0 && bd.itl1 && !bd.itl0_to_itl1s) {
          bd.itl0_to_itl1s = {};
          for (var cName in bd.itl0) bd.itl0_to_itl1s[cName] = [];
          for (var itl1Name in bd.itl1) {
            var pt = turf.point(bd.itl1[itl1Name].centroid);
            for (var cName2 in bd.itl0) {
              try {
                var cFeat = bd.itl0[cName2].geom;
                if (cFeat.type !== "Feature") cFeat = turf.feature(cFeat);
                if (turf.booleanPointInPolygon(pt, cFeat)) {
                  bd.itl0_to_itl1s[cName2].push(itl1Name);
                  break;
                }
              } catch (_) {}
            }
          }
        }
      }

      function assignCountryToTeams() {
        if (!boundariesReady || typeof BOUNDARIES === "undefined" || !allTeams.length) return;
        var bd = BOUNDARIES;
        if (!bd.itl0_to_itl1s) return;
        var itl1ToCountry = {};
        for (var cName in bd.itl0_to_itl1s) {
          var children = bd.itl0_to_itl1s[cName];
          for (var i = 0; i < children.length; i++) {
            itl1ToCountry[children[i]] = cName;
          }
        }
        for (var j = 0; j < allTeams.length; j++) {
          var t = allTeams[j];
          if (!t.r0 && t.r1 && itl1ToCountry[t.r1]) t.r0 = itl1ToCountry[t.r1];
        }
      }

      function onTeamsLoaded() {
        allTeams = TEAMS_DATA;
        assignCountryToTeams();
        buildTierIndex();
        document.getElementById("searchInput").placeholder =
          "Search " + allTeams.length.toLocaleString() + " teams\u2026";
        loadFromHash();
      }
      function onBoundariesLoaded() {
        boundariesReady = true;
        prepareBoundaryItl0();
        assignCountryToTeams();
        addBoundaryOutlines();
        if (cachedAllPlaced.length > 0) renderTerritories(cachedAllPlaced);
      }
    </script>
    <script src="teams.js" onload="onTeamsLoaded()"></script>
    <script src="boundaries.js" onload="onBoundariesLoaded()"></script>
  </body>
</html>
